title = "Implement Hard Feature Workflow"

[[step]]
name = "implement"
model = "claude-opus-4-7"
prompt = """
Implement work item {{work_item_number}}, adhering strongly to its implementation plan. Iterate until the work item is comprehensively implemented, the build succeeds, and all existing tests pass. DO NOT write any new tests yet, just fix any you break. New tests will be implemented in the next step. Do not write or change any docs yet, that will happen in a future step.

Be sure to double check your work against the work item implementation spec.
"""

[[step]]
name = "parity-check"
depends_on = ["implement"]
prompt = """
Review the implementation of {{work_item_number}} to ensure there is parity between CLI, TUI, and API modes. Ensure user input is properly handled via traits for stdin (CLI) and dialogs (TUI) and no-op (API). Ensure parity.rs is up to date and correct. Ensure all new subcommands, flags, config options, etc. are correctly and equally supported by all 3 modes. Ensure the user will get the expected and correct experience unique to each of the 3 modes while ensuring that all possible shared functionality is modularly implemented to ensure identical functionality and code re-use across modes wherever possible. Ensure flag and argument parsing/handling is implemented and equal between the 3 modes. Ensure that interactive container execution is properly handled in the correct unique methods for each of the 3 modes (bound stdin/stdout for CLI, interactive container window PTY for TUI, --non-interactive flag handling for API). Ensure TUI-specific concerns such as rendering, dialogs, keyboard shortcuts etc. are kept contained to TUI modules and that underlying logic is modular to allow for TUI-specific behavriour without causing unneeded copied code between modes. Fix any issues you see as critical, high, or medium importance. Leave a note on the filesystem in the worktree noting any minor or trivial issues for a later review stage to pick up and inform the developer of. Do not write any new tests, but if needed add new integration/parity/end-to-end test descriptions to the work item Markdown for a future test-writing agent to pick up. Mode parity is the most important factor in providing a good user experience for users of awman, so think carefully and ensure the user will get an expected, correct, and consistent user experience no matter which mode they're using.
"""

[[step]]
name = "tests"
depends_on = ["parity-check"]
prompt = """
Implement tests for work item {{work_item_number}} as described in the project aspec and the work item test considerations below:

{{work_item_section:[Test Considerations]}}
"""

[[step]]
name = "docs"
model = "claude-haiku-4-5"
depends_on = ["parity-check"]
prompt = """
Write comprehensive documentation for work item {{work_item_number}}, following the plan that was previously written and following guidelines from the project aspec.
"""

[[step]]
name = "review"
depends_on = ["docs", "tests"]
prompt = """
Review the changes made for work item {{work_item_number}} in the previous steps for correctness, completeness, security, and style. Suggest improvements if needed, but ask before changing anything. Ensure all edge cases are considered:

{{work_item_section:[Edge Case Considerations]}}

Ensure tests were implemented as described below:

{{work_item_section:[Test Considerations]}}

When complete, provide a short manual test plan and give me a chance to manually test and make any tweaks needed with freeform chat.
"""
